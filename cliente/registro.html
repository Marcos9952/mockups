<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliente · Registro — Mockup</title>
<link rel="stylesheet" href="../assets/css/styles.css">
<style>
  .step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .step-header .back-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--color-bg); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .step-dots { display: flex; gap: 6px; }
  .step-dots span { width: 22px; height: 4px; border-radius: 999px; background: var(--color-border); }
  .step-dots span.done { background: var(--color-primary); }
  .check-row { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; color: var(--color-text-muted); line-height: 1.5; margin: 4px 0 18px; }
  .check-row input { margin-top: 3px; }
</style>
</head>
<body>
  <div class="mock-banner">App Cliente · Registro — paso 1 de 3: datos de cuenta · <a href="../index.html">← índice</a></div>
  <div class="phone-shell">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-statusbar"><span>9:41</span><span>🔋 100%</span></div>
      <div class="phone-body">
        <div class="app-content">
          <div class="step-header">
            <a class="back-btn" href="login.html">←</a>
            <div class="step-dots"><span class="done"></span><span></span><span></span></div>
          </div>

          <h1 style="font-size:20px; margin:0 0 4px;">Crea tu cuenta</h1>
          <p style="color:var(--color-text-muted); font-size:13px; margin:0 0 22px;">Necesitamos algunos datos para empezar a enviarte pedidos de agua.</p>

          <div class="field">
            <label>Nombres y apellidos</label>
            <input type="text" placeholder="Ej. María Fernanda Torres">
          </div>
          <div class="field">
            <label>Teléfono</label>
            <input type="text" placeholder="987 654 321">
          </div>
          <div class="field">
            <label>Correo (opcional)</label>
            <input type="text" placeholder="maria@correo.com">
          </div>
          <div class="field">
            <label>Contraseña</label>
            <input type="password" placeholder="Mínimo 8 caracteres">
          </div>
          <div class="field">
            <label>Confirmar contraseña</label>
            <input type="password" placeholder="••••••••">
          </div>

          <div class="check-row">
            <input type="checkbox" checked>
            <span>Acepto los <a href="#" style="color:var(--color-primary); font-weight:600;">Términos y Condiciones</a> y la <a href="#" style="color:var(--color-primary); font-weight:600;">Política de Privacidad</a>.</span>
          </div>

          <a class="btn btn-primary btn-block" href="verificacion.html">Crear cuenta</a>

          <div style="text-align:center; margin-top:18px; font-size:13px;">
            ¿Ya tienes cuenta? <a href="login.html" style="color:var(--color-primary); font-weight:700;">Inicia sesión</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
