<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliente · Login — Mockup</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="mock-banner">App Cliente · Login/Registro · <a href="../index.html">← volver al índice</a></div>
  <div class="phone-shell">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-statusbar"><span>9:41</span><span>🔋 100%</span></div>
      <div class="phone-body">
        <div class="app-content" style="display:flex; flex-direction:column; justify-content:center; min-height:100%;">
          <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:44px;">💧</div>
            <h1 style="margin:10px 0 4px; font-size:20px;">AguaYa</h1>
            <p style="color:var(--color-text-muted); font-size:13px; margin:0;">Pedidos de agua a domicilio, en toda el Perú</p>
          </div>

          <div class="field">
            <label>Teléfono o correo</label>
            <input type="text" placeholder="987 654 321">
          </div>
          <div class="field">
            <label>Contraseña</label>
            <input type="password" placeholder="••••••••">
          </div>

          <a class="btn btn-primary btn-block" href="catalogo.html">Iniciar sesión</a>

          <div style="text-align:center; margin:16px 0; color:var(--color-text-faint); font-size:12px;">o continúa con</div>

          <div style="display:flex; gap:10px;">
            <a class="btn btn-outline btn-block" href="catalogo.html">📱 Google</a>
            <a class="btn btn-outline btn-block" href="catalogo.html">📘 Facebook</a>
          </div>

          <div style="text-align:center; margin-top:22px; font-size:13px;">
            ¿No tienes cuenta? <a href="#" style="color:var(--color-primary); font-weight:700;">Regístrate</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
