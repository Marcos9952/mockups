<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repartidor · Login — Mockup</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="mock-banner">App Repartidor · Login · <a href="../index.html">← volver al índice</a></div>
  <div class="phone-shell">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-statusbar"><span>9:41</span><span>🔋 100%</span></div>
      <div class="phone-body">
        <div class="app-content" style="display:flex; flex-direction:column; justify-content:center; min-height:100%;">
          <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:44px;">🛵</div>
            <h1 style="margin:10px 0 4px; font-size:20px;">AguaYa Repartidor</h1>
            <p style="color:var(--color-text-muted); font-size:13px; margin:0;">Acceso exclusivo para personal de reparto</p>
          </div>

          <div class="field">
            <label>Código de repartidor o DNI</label>
            <input type="text" placeholder="72345678">
          </div>
          <div class="field">
            <label>Contraseña</label>
            <input type="password" placeholder="••••••••">
          </div>

          <a class="btn btn-primary btn-block" href="pedidos.html">Iniciar sesión</a>

          <div class="card" style="margin-top:20px; background:var(--color-primary-light); border:none;">
            <div style="font-size:12px; font-weight:700; color:var(--color-primary-dark);">Sede asignada</div>
            <div style="font-size:13.5px; font-weight:800; margin-top:2px;">Sede San Isidro</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
