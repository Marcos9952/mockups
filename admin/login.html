<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Login — Mockup</title>
<link rel="stylesheet" href="../assets/css/styles.css">
<style>
  .admin-login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0b1120; }
  .admin-login-card { background: var(--color-surface); border-radius: var(--radius-lg); padding: 40px 36px; width: 380px; box-shadow: var(--shadow-lg); }
</style>
</head>
<body>
  <div class="mock-banner">Panel Administrador · Login · <a href="../index.html">← volver al índice</a></div>
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:38px;">💧</div>
        <h1 style="font-size:19px; margin:10px 0 2px;">AguaYa Admin</h1>
        <p style="font-size:12.5px; color:var(--color-text-muted); margin:0;">Panel de gestión nacional</p>
      </div>
      <div class="field">
        <label>Correo corporativo</label>
        <input type="text" placeholder="admin@aguaya.pe">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••">
      </div>
      <a class="btn btn-primary btn-block" href="dashboard.html">Ingresar al panel</a>
    </div>
  </div>
</body>
</html>
