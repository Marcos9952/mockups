<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Móvil · Sede — Mockup</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="mock-banner">Panel Administrador · versión móvil · Editar / nueva sede · <a href="../index.html">← índice</a></div>
  <div class="phone-shell">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-statusbar"><span>9:41</span><span>🔋 100%</span></div>
      <div class="phone-body">
        <div class="app-header">
          <a class="back-btn" href="sedes.html">←</a>
          <h1>Sede San Isidro</h1>
          <div style="width:34px;"></div>
        </div>

        <div class="app-content" style="padding-bottom:24px;">
          <div class="field">
            <label>Nombre de la sede</label>
            <input type="text" value="Sede San Isidro">
          </div>
          <div class="field">
            <label>Ciudad / Departamento</label>
            <input type="text" value="Lima — Lima">
          </div>
          <div class="field">
            <label>Dirección</label>
            <input type="text" value="Av. República de Panamá 3505">
          </div>
          <div class="map-placeholder" style="min-height:110px; margin-bottom:14px;">
            <div class="pin" style="top:45%; left:50%;">📍</div>
            Ubicar sede en el mapa
          </div>
          <div class="field">
            <label>Radio de asignación automática (km)</label>
            <input type="text" value="5">
          </div>
          <div class="field">
            <label>Estado</label>
            <select><option>Activa</option><option>Inactiva</option></select>
          </div>

          <div class="card">
            <div class="toolbar" style="margin-bottom:10px;">
              <div class="section-title" style="margin:0; font-size:13px;">Repartidores (6)</div>
              <a href="repartidores.html" style="font-size:11.5px; color:var(--color-primary); font-weight:700;">Ver todos →</a>
            </div>
            <div style="font-size:12px; color:var(--color-text-muted); line-height:2;">
              🟢 Carlos Ramírez — Disponible<br>
              🟡 Luis Mendoza — En ruta<br>
              🟢 Diego Farfán — Disponible
            </div>
          </div>

          <div style="display:flex; gap:8px; margin-top:16px;">
            <span class="btn btn-outline btn-block">Cancelar</span>
            <span class="btn btn-primary btn-block">Guardar</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
